name: Daily Horoscope Generation

on:
  schedule:
    - cron: '0 20 * * *'   # 1:30 AM IST (20:00 UTC)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed for pushing commits
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 1

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate Horoscopes (Groq AI)
        id: groq
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-horoscope.mjs

      - name: Generate Fallback Horoscopes (if Groq failed)
        if: steps.groq.outcome == 'failure'
        run: node scripts/fallback-horoscope.mjs

      - name: Verify output file exists
        run: test -f public/data/daily-horoscope.json || exit 1

      - name: Configure Git
        run: |
          git config user.name "Babaji-Bot"
          git config user.email "bot@neemkaroribaba.org"

      - name: Commit and Push Horoscope
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # If GH_PAT is available, use it for push; otherwise default push
          if [ -n "$GH_PAT" ]; then
            git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
          fi
          git add public/data/daily-horoscope.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🌅 Daily Horoscope $(date +'%Y-%m-%d')"
            git push
          fi
